<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Julia 的工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Noto Sans TC", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen bg-gray-50">
    <div class="max-w-2xl mx-auto px-4 py-12">
      <h1 class="text-3xl font-bold text-gray-800 mb-2">🏫 Julia 的工具</h1>
      <p class="text-gray-500 mb-8">好用工具集</p>

      <div class="grid gap-4">
        <a
          href="tools/wordcloud/"
          class="block bg-white rounded-xl shadow-sm border border-gray-200 p-5 hover:shadow-md hover:border-blue-300 transition"
        >
          <div class="flex items-center gap-3">
            <span class="text-3xl">☁️</span>
            <div>
              <div class="font-bold text-gray-800">即時文字雲</div>
              <div class="text-sm text-gray-500">
                學員輸入短語，即時生成文字雲展示
              </div>
            </div>
            <span class="ml-auto text-gray-400">→</span>
          </div>
        </a>

        <a
          href="tools/voice-input/"
          class="block bg-white rounded-xl shadow-sm border border-gray-200 p-5 hover:shadow-md hover:border-blue-300 transition"
        >
          <div class="flex items-center gap-3">
            <span class="text-3xl">🎙️</span>
            <div>
              <div class="font-bold text-gray-800">語音輸入工具</div>
              <div class="text-sm text-gray-500">
                本機 Whisper 語音轉文字，Ctrl+Shift+Space 錄音，自動貼入任何應用程式
              </div>
            </div>
            <span class="ml-auto text-gray-400">→</span>
          </div>
        </a>
      </div>
    </div>
  </body>
</html>
